<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Matrix</title>
    <style>
   body {
    background-color: black;
    overflow: hidden;
    display: flex;
    justify-content: center; /* Centrar horizontalmente */
    align-items: center;     /* Centrar verticalmente */
    height: 100vh;           /* Asegurarse de que el body tome toda la altura de la ventana */
    margin: 0;               /* Eliminar cualquier margen predeterminado */
}

      .stream {
        color: #0F0;
        font-size: 2em;
        font-family: "Lucida Console", Monaco, monospace;
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        right: 0;
        margin: auto;
        height: 90%;
        width: 5%;
        text-align: center;
        white-space: nowrap;
      }

      @media (min-width: 768px) {
        .stream {
          font-size: 3em;
          width: 3%;
        }
      }

      @media (min-width: 992px) {
        .stream {
          font-size: 4em;
          width: 2%;
        }
      }
	  h2 {
			margin-top: 20px;
			font-size: 24px;
			font-weight: normal;
			text-transform: uppercamelcase;
			letter-spacing: 2px;
		}
    </style>
  </head>

  <body>

    <div id="matrix"></div>
    <script src="matrix.js"></script>
  </body>

</html>
